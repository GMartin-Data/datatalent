# CI — GitHub Actions
# Déclenché sur chaque PR vers main.
#
# Jobs:
# - lint & test Python (ruff + pytest),
# - dbt validate (compile + test),
# - terraform validate (fmt + validate).
#
# Le CI ne remplace PAS les vérifications locales dbt :
#   cd dbt && uv run dbt build --select <modèle>

name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run pytest -v

  dbt-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_DBT }}
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: |
          cat > profiles.yml << EOF
          datatalent:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: ${{ secrets.GCP_PROJECT_ID }}
                dataset: staging
                location: ${{ secrets.GCP_REGION }}
                threads: 4
          EOF
      - run: uv run dbt deps
      - run: uv run dbt compile
      - run: uv run dbt test

  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"
      - run: terraform init -backend=false
      - run: terraform fmt -check
      - run: terraform validate
