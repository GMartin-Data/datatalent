# CI — GitHub Actions
# Déclenché sur chaque PR vers main.
#
# Jobs:
# - python-checks (lint + tests Python),
# - dbt-validate (compile + test),
# - terraform-validate (fmt + validate).
#
# Le CI ne remplace PAS les vérifications locales dbt :
#   cd dbt && uv run dbt build --select <modèle>

name: CI

on:
  pull_request:
    branches: [ main ]

# Annule automatiquement les runs CI en cours sur la même PR
# quand un nouveau commit est poussé. Evite de gaspiller des
# minutes runner et surtout des requêtes BigQuery facturées
# dans dbt-validate.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint et tests Python regroupés dans un seul job:
  # ils partagent le même environnement uv, donc fusionner évite
  # de payer 2x le coût de setup runner + checkout + uv sync
  # au prix marginal de ne pas paralléliser lint et tests.
  python-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4

      # Sync unique, partagé par les steps lint et tests ci-dessous
      - run: uv sync --group dev

      # Lint d'abord (fail fast): Si le formatage est cassé,
      # inutile de lancer pytest. Le job échoue dès ce step.
      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Tests (pytest)
        run: uv run pytest -v

  dbt-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          # Clé JSON du service account DBT: vraiment sensible,
          # reste dans secrets.*
          credentials_json: ${{ secrets.GCP_SA_KEY_DBT }}
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: |
          # GCP_PROJECT_ID et GCP_REGION migrés vers vars.* :
          # valeurs non-sensibles, déjà visibles dans les logs
          # Terraform et les URLs Artifact Registry. Les garder
          # dans secrets.* masquait inutilement les logs.
          cat > profiles.yml << EOF
          datatalent:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: ${{ vars.GCP_PROJECT_ID }}
                dataset: staging
                location: ${{ vars.GCP_REGION }}
                threads: 4
          EOF
      - run: uv run dbt deps
      - run: uv run dbt compile
      - run: uv run dbt test

  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"
      - run: terraform init -backend=false
      - run: terraform fmt -check
      - run: terraform validate
