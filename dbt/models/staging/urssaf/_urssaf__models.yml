version: 2

models:
  - name: stg_urssaf__effectifs_commune_ape
    description: >
      Effectifs salariés et établissements employeurs IT par commune × code APE × année
      (2006–2024). 4 codes APE IT filtrés à l'ingestion (D37). Format long après unpivot.
      ⚠ Paris = arrondissements 75101–75120, pas commune centrale 75056.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - code_commune
            - code_ape
            - annee
    columns:
      - name: code_commune
        description: Code INSEE commune. ⚠ Paris = arrondissements 75101–75120.
        data_tests:
          - not_null
      - name: intitule_commune
        description: Champ composite URSSAF "code nom" (ex "94065 Rungis"). Non utilisé en aval.
      - name: code_departement
        description: Code département
        data_tests:
          - not_null
      - name: code_ape
        description: Code APE sans point (6201Z, 6202A, 6203Z, 6209Z)
        data_tests:
          - not_null
          - accepted_values:
              values: ['6201Z', '6202A', '6203Z', '6209Z']
      - name: annee
        description: Année de référence (2006–2024)
        data_tests:
          - not_null
      - name: nb_etablissements
        description: Nombre d'établissements employeurs. COALESCE(raw, 0) appliqué.
        data_tests:
          - not_null
      - name: effectifs_salaries
        description: Effectifs salariés en fin d'année. COALESCE(raw, 0) appliqué.
        data_tests:
          - not_null

  - name: stg_urssaf__masse_salariale_na88
    description: Masse salariale brute secteur IT (NA88 = 62), ~30 lignes.